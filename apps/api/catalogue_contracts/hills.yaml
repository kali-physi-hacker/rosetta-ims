# ─────────────────────────────────────────────────────────────────────────────
# Catalogue data contract — Hill's
# Source: "Hill's Science Diet Price List.pdf" (Effective 1 APR 2024)
# Status: DRAFT for review. ⚑ = a decision that needs your call.
# ─────────────────────────────────────────────────────────────────────────────
supplier: "Hill's"
supplier_id: 14
format: pdf_table            # one product per row, explicit column headers (bilingual EN / 中文)
match_by: supplier_sku       # "Product Code" is the stable key across editions

# ── Non-column facts ────────────────────────────────────────────────────────
document:
  species:
    from: section_header     # page banner: "Hill's Science Diet (Feline)" / "(Canine)"
    map: { Feline: cat, Canine: dog }
  segment:                   # ⚑ confirm mapping
    from: product_range      # "Prescription Diet" vs "Science Diet"
    map: { "Prescription Diet": vet, "Science Diet": non_vet }
  category: { const: Food }

# ── Column → canonical field ────────────────────────────────────────────────
columns:
  supplier_sku:  "Product Code / 產品編號"          # e.g. 10447, 6610, 606869
  description:   { join: ["Product Range / 產品系列", "Life Stage / 生命階段", "Product Description / 產品名稱"], sep: " · " }
  pack_size:     "Size / 重量"                       # "2.8oz" | "5.5oz" | "3.5lb" | "2kg" | "12.5 oz"
  brand:         { const: "Hill's" }                 # single-brand catalogue — no brand column

# ── Pricing model ───────────────────────────────────────────────────────────
pricing:
  basis: per_unit                                    # EVERY price column is per sellable unit (per can / per bag)
  units_per_pack: { const: 1 }                       #   → effective unit cost = basic_cost / 1
  basic_cost:
    from: "Gross Wholesale Price / 每箱·罐"            # ✔ CONFIRMED — our cost basis (stable, order-size-independent)
    # the "Net Invoice @0/4/6%" columns are retained as catalogue evidence but do NOT set basic_cost
  rrp:  "Recommended Retail Selling Price / 建議零售價"
  # present but not mapped: "Regular Retail Price / 正價"

# ── Net weight (per sellable unit) ──────────────────────────────────────────
weight:
  parse_from: pack_size      # the "Size / 重量" string IS the per-unit net weight; the engine converts
                             #   "2.9 oz" | "24/2.9 oz" (case of 24) | "85g" | "3.5lb" | "2kg" → grams
                             #   (a leading "24/" case-pack count is ignored — the sell-unit weight is used)

# ── Ordering terms (descriptive; never touch the cost divisor) ──────────────
ordering:
  order_increment_qty: "Order Multiple / 訂貨單位"    # 24 (canned case) | 12 | 1 (bags)
  order_increment_uom: { from: sell_unit }           # can | bag

# ── Row validation (reject / flag at ingestion) ────────────────────────────
validate:
  - "cost_price < rrp"                               # a cost/RRP swap trips this
  - "order_increment_qty >= 1"
  # (basic_cost IS the Gross Wholesale column, so a separate "≤ gross wholesale" check isn't applicable)
