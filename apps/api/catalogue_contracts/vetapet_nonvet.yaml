# ─────────────────────────────────────────────────────────────────────────────
# Catalogue data contract — Vetapet (Non-Vet)   ⚑ DRAFT for review
# Distributor: C. VETAPET & COMPANY / 施惠德洋行. Non-vet AA catalogue (multi-brand:
# Ark Naturals, Beaphar, Chanelle, Open Farm, …). Chinese-primary price rows:
# 編號 · 產品名稱 · 重量 · 批發價 (wholesale) · 零售價 (retail)
# ⚑ = a decision that needs your call.
# ─────────────────────────────────────────────────────────────────────────────
supplier: "Vetapet (Non-Vet)"
supplier_id: 90            # ⚑ confirm — non-vet AA catalogue uploads land under 90
format: pdf_table
match_by: supplier_sku

document:
  species:
    from: product_name     # Dog/Cat/犬/貓 in the name
    default: both
  segment: { const: non_vet }            # non-vet catalogue
  category: { from: section_header }      # ⚑ Supplement / Food / Pet Hygiene by brand section; else AI

columns:
  supplier_sku:  "CODE NO / 編號"
  description:   "PRODUCT NAME / 產品名稱"
  pack_size:     "重量 / SIZE"                     # "1盒40條" | "1.5 KG"  (descriptive)

pricing:
  basis: per_unit
  units_per_pack: { const: 1 }
  autoswap_cost_rrp: true                         # 批發價 always below 零售價 → auto-fix a swapped extraction
  basic_cost:
    from: "批發價 / WHOLESALE PRICE"                # ✔ our cost — strip the HK$ / $ prefix
  rrp:  "零售價 / RETAIL PRICE"

weight:
  parse_from: pack_size

validate:
  - "cost_price < rrp"
  - "cost_price > 0"
